name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        # The global setup in vitest.config.ts runs `npm run build:demo:notypecheck`
        # automatically before the test suite begins.  The separate `tsc -b` step
        # in the full build is omitted here because profile-data.ts is user-supplied
        # and absent in this demo/CI context — the Vite plugins are what we test.
        run: npm test
